# ─── OPERIS CO₂ — Nginx Configuration ───────────────────────────────────────
# Versão: 2.0 | Ambiente: Production
# Funcionalidades: SSL termination, gzip, cache, rate limiting, security headers

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Cache de Proxy ────────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=operis_cache:10m
        max_size=1g
        inactive=60m
        use_temp_path=off;

    # ── Rate Limiting ─────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream ──────────────────────────────────────────────────────────
    upstream operis_app {
        server app:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS Redirect ─────────────────────────────────────────────
    server {
        listen 80;
        server_name co2contraincendio.com.br www.co2contraincendio.com.br;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS Server ──────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name co2contraincendio.com.br www.co2contraincendio.com.br;

        # SSL
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        add_header Strict-Transport-Security "max-age=63072000" always;

        # Security Headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

        # Limite de conexões
        limit_conn conn_limit 20;

        # ── Assets Estáticos (Vite build) ─────────────────────────────
        location /assets/ {
            proxy_pass http://operis_app;
            proxy_cache operis_cache;
            proxy_cache_valid 200 30d;
            proxy_cache_use_stale error timeout updating;
            add_header Cache-Control "public, max-age=2592000, immutable";
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ── API tRPC ──────────────────────────────────────────────────
        location /api/trpc/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://operis_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ── Auth Endpoints ────────────────────────────────────────────
        location /api/oauth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://operis_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Stripe Webhook ────────────────────────────────────────────
        location /api/stripe/webhook {
            proxy_pass http://operis_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Stripe-Signature $http_stripe_signature;
            # Sem buffer para webhooks
            proxy_buffering off;
        }

        # ── Health Check ──────────────────────────────────────────────
        location /api/health {
            proxy_pass http://operis_app;
            access_log off;
        }

        # ── SPA Fallback (React Router) ───────────────────────────────
        location / {
            proxy_pass http://operis_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Cache agressivo para HTML (invalidado pelo hash do Vite)
            proxy_cache operis_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_bypass $http_pragma $http_authorization;
        }
    }
}
