# ═══════════════════════════════════════════════════════════════════════════════
# OPERIS Command Center — Docker Compose (Modelo Modular Diamond)
# Projeto: CO₂ Contra Incêndio SaaS | D.G.O. — Dashboard de Governança
# Responsável: Aleixo (Technical Manager) | JULY AOG — Project Diamond
#
# ARQUITETURA MODULAR DIAMOND:
#   ┌─────────────────────────────────────────────────────────────────┐
#   │  Host Linux Mint (Samsung / HD 1TB WDC WD10PURX)               │
#   │                                                                 │
#   │  ┌──────────┐    ┌────────────────────────────────────────────┐ │
#   │  │  Nginx   │───▶│  operis-app (Node.js + tRPC)              │ │
#   │  │  :80     │    │  :3000 ← DETENTOR EXCLUSIVO               │ │
#   │  └──────────┘    │  Boot Orchestrator:                        │ │
#   │                  │    1. Wait MySQL :3306                     │ │
#   │                  │    2. Git Import (GitHub → /app/git-import)│ │
#   │                  │    3. drizzle-kit push (54 tabelas)        │ │
#   │                  │    4. node dist/index.js                   │ │
#   │                  └────────────────────────────────────────────┘ │
#   │                                                                 │
#   │  ┌──────────────────────────────────────────────────────────┐   │
#   │  │  operis-db (MySQL 8.0) — Módulo Independente             │   │
#   │  │  Volume: /media/aleixo/BACKUP_CO2/operis-db-data/        │   │
#   │  │  Persistência Soberana no HD de 1TB                      │   │
#   │  └──────────────────────────────────────────────────────────┘   │
#   └─────────────────────────────────────────────────────────────────┘
#
# REGRAS DE OURO:
#   ✅ operis-app é o DETENTOR EXCLUSIVO da porta 3000
#   ✅ operis-dev REMOVIDO — conflito de portas eliminado
#   ✅ Volume MySQL no HD de 1TB (bind mount soberano)
#   ✅ Reiniciar containers NÃO apaga dados
#   ✅ Status "Sincronizando Banco" exposto via /api/health
#
# Pré-requisito: arquivo .env na raiz (cp .env.example .env)
# Criar diretório de dados: mkdir -p /media/aleixo/BACKUP_CO2/operis-db-data
# GID do grupo docker: stat -c "%g" /var/run/docker.sock
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Banco de Dados MySQL 8.0 (Módulo Independente e Estável) ────────────────
  # Sobe de forma autônoma. O app aguarda este serviço estar "healthy"
  # antes de iniciar o Boot Orchestrator.
  db:
    image: mysql:8.0
    container_name: operis-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_operis_2025}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-operis_db}
      MYSQL_USER: ${MYSQL_USER:-operis_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-operis_senha_forte_2025}
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M
    volumes:
      # ── PERSISTÊNCIA SOBERANA: HD de 1TB WDC WD10PURX ──────────────────────
      # Dados do MySQL mapeados diretamente para o HD de backup de 1TB
      # IMPORTANTE: Crie o diretório antes de subir:
      #   mkdir -p /media/aleixo/BACKUP_CO2/operis-db-data
      - operis-db-data:/var/lib/mysql
    ports:
      # Expõe localmente para acesso via DBeaver/TablePlus (opcional)
      - "3306:3306"
    networks:
      - operis-network
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - -h
        - localhost
        - -u
        - root
        - --password=${MYSQL_ROOT_PASSWORD:-root_operis_2025}
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  # ── Aplicação Principal — DETENTOR EXCLUSIVO da porta 3000 ──────────────────
  # Módulo independente que sobe após o banco estar saudável.
  # O Boot Orchestrator (wait-for-db.sh) executa:
  #   1. Aguarda MySQL
  #   2. Git Import do GitHub
  #   3. drizzle-kit push (54 tabelas)
  #   4. node dist/index.js
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: co2-operis:latest
    container_name: operis-app
    restart: unless-stopped
    # ── PORTA 3000: DETENTOR EXCLUSIVO ──────────────────────────────────────
    # Nenhum outro serviço usa esta porta. operis-dev foi REMOVIDO.
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      # DATABASE_URL aponta SEMPRE para o container 'db' (não para localhost)
      DATABASE_URL: mysql://${MYSQL_USER:-operis_user}:${MYSQL_PASSWORD:-operis_senha_forte_2025}@db:3306/${MYSQL_DATABASE:-operis_db}
      DB_HOST: db
      DB_PORT: "3306"
      # Repositório GitHub para Git Import no boot
      OPERIS_GITHUB_REPO: https://github.com/mindos-dev/co2contraincendio.git
    volumes:
      # ── D.G.O.: Docker Socket (leitura interativa de containers) ────────────
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # ── D.G.O.: HD 1TB de Backup (WDC WD10PURX) — Disk Monitor ────────────
      - /media/aleixo/BACKUP_CO2:/host/backup:ro
      # ── D.G.O.: Sistema do Host (CPU/RAM/processos) ─────────────────────────
      - /proc:/host/proc:ro
      # ── D.G.O.: Temperatura do hardware ─────────────────────────────────────
      - /sys/class/thermal:/host/sys/class/thermal:ro
      # ── D.G.O.: Script de sincronização ─────────────────────────────────────
      - /home/aleixo/sync_operis.sh:/host/scripts/sync_operis.sh:ro
      # ── Git Import: cache do repositório (persiste entre reinicializações) ───
      - operis-git-cache:/app/git-import
    depends_on:
      db:
        condition: service_healthy
    networks:
      - operis-network
    # ── Acesso ao host via gateway (Ollama em localhost:11434) ──────────────
    extra_hosts:
      - "host-gateway:host-gateway"
    # ── Grupo docker para acesso ao socket sem root ─────────────────────────
    group_add:
      - "${DOCKER_GROUP_ID:-127}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Nginx Reverse Proxy (porta 80 → app:3000) ───────────────────────────────
  # Proxy reverso simples: todo tráfego da porta 80 vai para o app na 3000
  nginx:
    image: nginx:alpine
    container_name: operis-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      app:
        condition: service_started
    networks:
      - operis-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 3

  # ── Ollama IA Local (descomente para rodar em container) ────────────────────
  # Por padrão, o Ollama roda no HOST Linux Mint (acessado via host-gateway)
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: operis-ai-local
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   networks:
  #     - operis-network

# ═══════════════════════════════════════════════════════════════════════════════
# VOLUMES — Persistência Soberana
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  # ── Dados do MySQL: bind mount no HD de 1TB ──────────────────────────────────
  # Localização física: /media/aleixo/BACKUP_CO2/operis-db-data/
  # IMPORTANTE: Execute antes do primeiro up:
  #   mkdir -p /media/aleixo/BACKUP_CO2/operis-db-data
  operis-db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /media/aleixo/BACKUP_CO2/operis-db-data

  # ── Cache do Git Import: repositório clonado persiste entre reinicializações ─
  operis-git-cache:
    driver: local

  # ── Cache do Nginx ───────────────────────────────────────────────────────────
  nginx-cache:
    driver: local

  # ── Modelos Ollama (se rodar em container) ───────────────────────────────────
  # ollama-models:

# ═══════════════════════════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  operis-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
