          "name": "O que é um sistema de supressão por CO₂?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "É um sistema fixo automático que utiliza dióxido de carbono (CO₂) para suprimir incêndios em ambientes fechados como salas de servidores, geradores e transformadores. Funciona por abafamento, eliminando o oxigênio da área protegida. Regulamentado pela ABNT NBR 12615 e NFPA 12."
          }
        },
        {
          "@type": "Question",
          "name": "O que é o sistema saponificante para coifas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "É um sistema wet chemical (agente saponificante) certificado UL 300, projetado especificamente para proteger cozinhas comerciais e industriais contra incêndios de Classe K (óleos e gorduras). Funciona automaticamente sem energia elétrica, acionando em menos de 30 segundos."
          }
        },
        {
          "@type": "Question",
          "name": "Quais normas regulamentam os sistemas de incêndio no Brasil?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Os principais sistemas são regulamentados pela ABNT NBR 12615 (CO₂), NBR 13714 (hidrantes), NBR 17240 (alarmes), NBR 14518 (exaustão) e pelas normas americanas NFPA 12, NFPA 13, NFPA 72 e UL 300. O Corpo de Bombeiros de Minas Gerais exige conformidade com as Instruções Técnicas (ITs) do CBMMG."
          }
        },
        {
          "@type": "Question",
          "name": "Vocês atendem fora de Belo Horizonte?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. Atendemos Belo Horizonte, toda a Região Metropolitana e demais cidades de Minas Gerais. Para projetos de grande porte, atendemos todo o Brasil."
          }
        },
        {
          "@type": "Question",
          "name": "Como solicitar um orçamento para sistema de combate a incêndio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Entre em contato pelo telefone (31) 97358-1278, pelo e-mail co2contraincendio@gmail.com ou pelo formulário em nosso site. Realizamos visita técnica gratuita para levantamento e elaboração do orçamento."
          }
        },
        {
          "@type": "Question",
          "name": "Qual a diferença entre sistema de hidrante e sistema de sprinklers?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O sistema de hidrantes é acionado manualmente por bombeiros ou brigadistas, utilizando mangueiras para combate ao incêndio. Já o sistema de sprinklers é automático, acionando individualmente apenas os bicos na área do foco de calor. Ambos são regulamentados pela ABNT NBR 13714 e NBR 10897, respectivamente."
          }
        }
